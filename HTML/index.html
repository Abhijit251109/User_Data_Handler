<!DOCTYPE html>
<html>
<head>
  <title>Login - User Data Handler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; margin: 0; }
    .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 300px; }
    h2 { margin-top: 0; text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
    button { width: 100%; padding: 12px; margin: 8px 0; background: #4285f4; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #357ae8; }
    #msg { text-align: center; color: red; font-size: 14px; min-height: 20px; }
    .toggle { text-align: center; margin-top: 15px; font-size: 14px; color: #4285f4; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h2 id="form-title">Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="action-btn">Login</button>
    <p id="msg"></p>
    <div class="toggle" id="toggle">Need an account? Sign up</div>
  </div>

  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // PASTE YOUR firebaseConfig HERE
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;
    const title = document.getElementById('form-title');
    const btn = document.getElementById('action-btn');
    const toggle = document.getElementById('toggle');
    const msg = document.getElementById('msg');

    // If already logged in, go to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Toggle Login / Sign Up
    toggle.onclick = () => {
      isLogin = !isLogin;
      title.innerText = isLogin ? 'Login' : 'Sign Up';
      btn.innerText = isLogin ? 'Login' : 'Sign Up';
      toggle.innerText = isLogin ? 'Need an account? Sign up' : 'Have an account? Login';
      msg.innerText = '';
    };

    // Handle Login or Sign Up
    btn.onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      msg.innerText = '';

      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
        }
        // onAuthStateChanged will redirect
      } catch (error) {
        msg.innerText = error.message.replace('Firebase: ', '');
      }
    };
  </script>
</body>
</html>
